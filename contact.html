<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Threads | Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <span class="logo-mark">ET</span>
    <span>Eco Threads</span>
  </a>

  <button class="hamburger" aria-label="Open menu">☰</button>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<button id="cartBtn" class="cart-button">Cart (<b id="cartCount">0</b>)</button>

<aside id="cart">
  <button id="closeCart">x</button>
  <h2>Shopping Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total">Total: &pound;0.00</h3>
</aside>

<main>
  <section class="page-head">
    <h1>Contact Eco Threads</h1>
    <p>Request information about products, sizing, delivery or sustainability.</p>
  </section>

  <section class="contact">
    <form id="contactForm">
      <label for="name">Name</label>
      <input id="name" type="text" required>

      <label for="email">Email address</label>
      <input id="email" type="email" required>

      <label for="phone">Phone number</label>
      <input id="phone" type="tel">

      <label for="message">Message</label>
      <textarea id="message" rows="6" required></textarea>

      <button class="btn" type="submit">Request Information</button>
      <p id="formMsg"></p>
    </form>

    <div class="info">
      <h2>Contact Details</h2>
      <p><strong>Email:</strong> hello@ecothreads.example</p>
      <p><strong>Phone:</strong> 020 1234 5678</p>
      <p><strong>Opening hours:</strong> Monday-Friday, 9am-5pm</p>
    </div>
  </section>
</main>

<footer>
  <p>&copy; 2026 Eco Threads</p>
</footer>

<script src="script.js"></script>
</body>
</html>
