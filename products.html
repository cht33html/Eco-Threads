<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Threads | Products</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <span class="logo-mark">ET</span>
    <span>Eco Threads</span>
  </a>

  <button class="hamburger" aria-label="Open menu">☰</button>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<button id="cartBtn" class="cart-button">Cart (<b id="cartCount">0</b>)</button>

<aside id="cart">
  <button id="closeCart">x</button>
  <h2>Shopping Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total">Total: &pound;0.00</h3>
</aside>

<main>
  <section class="page-head">
    <h1>Products</h1>
    <p>Browse the Eco Threads collection.</p>
  </section>

  <section class="shop-tools">
    <button id="filterBtn">Filter</button>
    <input id="searchInput" type="search" placeholder="Search products">

    <select id="sortProducts">
      <option value="featured">Featured</option>
      <option value="low">Price: Low to High</option>
      <option value="high">Price: High to Low</option>
      <option value="az">Name: A-Z</option>
    </select>
  </section>

  <section id="filterPanel" class="filter-panel">
    <p><strong>Sizes:</strong> XS, S, M, L, XL, XXL</p>
    <p><strong>Price Range:</strong> &pound;24.99 - &pound;79.99</p>
  </section>

  <section class="category-tabs">
    <button class="category active" data-category="all">All</button>
    <button class="category" data-category="hoodies">Hoodies</button>
    <button class="category" data-category="tshirts">T-Shirts</button>
    <button class="category" data-category="jackets">Jackets</button>
    <button class="category" data-category="trousers">Trousers</button>
    <button class="category" data-category="other">Other</button>
  </section>

  <section id="productGrid" class="shop-grid"></section>

  <button id="loadMore" class="load-more">Load More Products</button>
</main>

<footer>
  <p>&copy; 2026 Eco Threads</p>
</footer>

<script src="script.js"></script>
</body>
</html>
